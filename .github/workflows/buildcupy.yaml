name: PyLops Testing (CuPy)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Check out source repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv with Python 3.11
        uses: astral-sh/setup-uv@v6
        with:
          python-version: 3.11
      - name: Install dependencies and pylops
        run: |
          uv sync --locked --extra advanced \
            --extra stat --extra gpu-cu12 \
            --extra deep-cu128 --all-groups
          echo "done!"
      - name: Use local CUDA 12.8 toolkit
        run: |
          if [ ! -d "$HOME/local/cuda" ]; then
            echo "CUDA 12.8 toolkit not found at $HOME/local/cuda"
            exit 1
          fi
          echo "CUDA_HOME=$HOME/local/cuda" >> "$GITHUB_ENV"
          echo "done!"
      - name: Test with pytest
        run: |
          # Use the local CUDA 12.8 toolchain from $HOME/local/cuda.
          export CUDA_HOME="${CUDA_HOME:-$HOME/local/cuda}"
          export CUPY_PYLOPS=1
          export TEST_CUPY_PYLOPS=1
          export PATH="$CUDA_HOME/bin:$PATH"
          export LD_LIBRARY_PATH="$CUDA_HOME/lib64:$LD_LIBRARY_PATH"
          uv run pytest --color=yes pytests/
          echo "done!"
